<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esqueci a senha</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg,#6a0dad,#1e1e2f);
            font-family: Arial, sans-serif;
        }

        .login-box{
            width: 100%;
            max-width: 420px;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0px 0px 25px rgba(0,0,0,0.3);
        }

        .logo{
            text-align: center;
            margin-bottom: 20px;
        }

        .logo img{
            width: 180px;
        }

        .btn-login{
            background-color: #6a0dad;
            border: none;
            transition: 0.3s;
        }

        .btn-login:hover{
            background-color: #5200a3;
            transform: scale(1.02);
        }

        .form-control:focus{
            border-color: #6a0dad;
            box-shadow: 0 0 10px rgba(106,13,173,0.4);
        }

        a{
            color: #6a0dad;
            text-decoration: none;
        }

        a:hover{
            text-decoration: underline;
        }

    </style>
</head>

<body>

    <div class="login-box">

        <!-- LOGO -->
        <div class="logo">
            <img src="imagem/logo.png" alt="Logo DoaHub">
        </div>

        <h2 class="text-center mb-4">Esqueci a senha</h2>

        <form>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" placeholder="Digite seu email">
            </div>

           
            <button class="btn btn-login text-white w-100">
                Proximo
            </button>

        </form>


    </div>

</body>
</html>
