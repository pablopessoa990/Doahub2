<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro DoaHub</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg,#6a0dad,#1e1e2f);
            font-family: Arial, sans-serif;
        }

        .cadastro{
            width: 100%;
            max-width: 420px;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0px 0px 25px rgba(0,0,0,0.3);
        }

        .logo{
            text-align: center;
            margin-bottom: 20px;
        }

        .logo img{
            width: 170px;
        }

        h2{
            text-align: center;
            margin-bottom: 30px;
            color: #6a0dad;
            font-weight: bold;
        }

        input{
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            border-radius: 10px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.3s;
        }

        input:focus{
            border-color: #6a0dad;
            box-shadow: 0 0 10px rgba(106,13,173,0.4);
        }

        button{
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #6a0dad;
            color: white;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover{
            background: #5200a3;
            transform: scale(1.02);
        }

        .login{
            text-align: center;
            margin-top: 20px;
        }

        .login a{
            color: #6a0dad;
            text-decoration: none;
            font-weight: bold;
        }

    </style>
</head>

<body>

    <div class="cadastro">

        <div class="logo">
            <img src="imagem/logo.png" alt="Logo DoaHub">
        </div>

        <h2>Criar Conta</h2>

        <form id="formCadastro">

            <input type="text" id="nome" placeholder="Digite seu nome">

            <input type="email" id="email" placeholder="Digite seu email">

            <input type="password" id="senha" placeholder="Digite sua senha">

            <button type="submit">
                Cadastrar
            </button>

        </form>

        <div class="login">
            Já possui conta?
            <a href="#">Entrar</a>
        </div>

    </div>

    <script>

        const formulario = document.getElementById("formCadastro");

        formulario.addEventListener("submit", async (event) => {

            event.preventDefault();

            const nome = document.getElementById("nome").value;
            const email = document.getElementById("email").value;
            const senha = document.getElementById("senha").value;

            try{

                const resposta = await fetch("http://localhost:3000/cadastro",{
                    method: "POST",
                    headers:{
                        "Content-Type":"application/json"
                    },
                    body: JSON.stringify({
                        nome,
                        email,
                        senha
                    })
                });

                const dados = await resposta.json();

                alert(dados.mensagem);

            }catch(erro){

                alert("Erro ao conectar com servidor");

            }

        });

    </script>

</body>
</html>
