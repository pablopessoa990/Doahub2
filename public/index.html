<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login DoaHub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg,#6a0dad,#1e1e2f);
            font-family: Arial, sans-serif;
        }

        .login-box{
            width: 100%;
            max-width: 420px;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0px 0px 25px rgba(0,0,0,0.3);
        }

        .logo{
            text-align: center;
            margin-bottom: 20px;
        }

        .logo img{
            width: 180px;
        }

        .btn-login{
            background-color: #6a0dad;
            border: none;
            transition: 0.3s;
        }

        .btn-login:hover{
            background-color: #5200a3;
            transform: scale(1.02);
        }

        .form-control:focus{
            border-color: #6a0dad;
            box-shadow: 0 0 10px rgba(106,13,173,0.4);
        }

        a{
            color: #6a0dad;
            text-decoration: none;
        }

        a:hover{
            text-decoration: underline;
        }

    </style>
</head>

<body>

    <div class="login-box">

        <div class="logo">
            <img src="imagem/logo.png" alt="Logo DoaHub">
        </div>

        <h2 class="text-center mb-4">Entrar no Sistema</h2>

        <form id="formLogin">

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    class="form-control" 
                    placeholder="Digite seu email"
                    required
                >
            </div>

            <div class="mb-3">
                <label class="form-label">Senha</label>
                <input 
                    type="password" 
                    id="senha" 
                    class="form-control" 
                    placeholder="Digite sua senha"
                    required
                >
            </div>

            <div class="d-flex justify-content-between mb-3">

                <div>
                    <input type="checkbox" id="lembrar">
                    <label for="lembrar">Lembrar</label>
                </div>

                <a href="Senha.html">Esqueci minha senha</a>

            </div>

            <button type="submit" class="btn btn-login text-white w-100">
                Entrar
            </button>

        </form>

        <p class="text-center mt-4">
            Não possui conta?
            <a href="cadastro.html">Cadastrar</a>
        </p>

    </div>

    <script>

        const formulario = document.getElementById("formLogin");

        formulario.addEventListener("submit", async (event) => {

            event.preventDefault();

            const email = document.getElementById("email").value;
            const senha = document.getElementById("senha").value;

            try {

                const resposta = await fetch("http://localhost:3000/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        email,
                        senha
                    })
                });

                const dados = await resposta.json();

                alert(dados.mensagem);

            } catch (erro) {

                alert("Erro ao conectar com servidor");

                console.error(erro);

            }

        });

    </script>

</body>
</html>
